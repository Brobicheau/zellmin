name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-wasip1

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --target wasm32-wasip1 --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Build workspace
        run: cargo build --target wasm32-wasip1 --workspace
